name: Renovate
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 16 * * 5"
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.18
        with:
          configurationFile: .github/renovate-config.js
          token: ${{ secrets.RENOVATE_TOKEN }}
