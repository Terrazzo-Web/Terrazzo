[workspace]
members = [
  "bazel/crate_universe_deps",
  "bazel/feature_deps",
  "demo",
  "framework/build",
  "framework/client",
  "framework/macro",
  "framework/terrazzo",
  "game",
  "pty",
  "remote/client",
  "remote/common",
  "remote/server",
  "terminal",
  "terminal/integration",
  "utils/autoclone/autoclone",
  "utils/autoclone/autoclone-tests",
  "utils/css/cli",
  "utils/css/css",
  "utils/css/macro",
  "utils/css/shared",
  "utils/fixture",
  "utils/nameth/nameth",
  "utils/nameth/nameth-macro",
  "utils/nameth/nameth-tests",
  "utils/synctex/cli",
  "utils/synctex/synctex",
  "utils/synctex/sys",
]
resolver = "2"

[workspace.package]
version = "0.2.13"
authors = ["Lamparo <LamparoS@Pavy.one>"]
edition = "2024"
repository = "https://github.com/Terrazzo-Web/Terrazzo"
license = "MIT"
description = """
Lightweight, simple and efficient web UI framework based on Rust and WASM.
"""

[profile.dev.package."*"]
# Set the default for dependencies in Development mode.
opt-level = 3

[profile.release]
codegen-units = 1
opt-level = 3            # Optimization level.
debug = false            # Include debug info.
debug-assertions = false # Enables debug assertions.
overflow-checks = false  # Enables runtime integer overflow checks.
lto = "fat"              # Sets link-time optimization.
panic = "abort"          # The panic strategy.
incremental = true       # Incremental compilation.

[profile.release.package.terrazzo-client]
opt-level = "s"

[workspace.dependencies]
autoclone = { version = "0.2.13", path = "utils/autoclone/autoclone" }
nameth = { version = "0.2.13", path = "utils/nameth/nameth" }
nameth-macro = { version = "0.2.13", path = "utils/nameth/nameth-macro" }
terrazzo = { version = "0.2.13", path = "framework/terrazzo", default-features = false }
terrazzo-build = { version = "0.2.13", path = "framework/build" }
terrazzo-client = { version = "0.2.13", path = "framework/client" }
terrazzo-css = { version = "0.2.13", path = "utils/css/css" }
terrazzo-css-cli = { version = "0.2.13", path = "utils/css/cli" }
terrazzo-css-macro = { version = "0.2.13", path = "utils/css/macro" }
terrazzo-css-shared = { version = "0.2.13", path = "utils/css/shared" }
terrazzo-fixture = { version = "0.2.13", path = "utils/fixture" }
terrazzo-macro = { version = "0.2.13", path = "framework/macro" }
terrazzo-pty = { version = "0.2.13", path = "pty" }
terrazzo-synctex = { version = "0.2.13", path = "utils/synctex/synctex" }
terrazzo-synctex-cli = { version = "0.2.13", path = "utils/synctex/cli" }
terrazzo-synctex-sys = { version = "0.2.13", path = "utils/synctex/sys" }
trz-gateway-client = { version = "0.2.13", path = "remote/client" }
trz-gateway-common = { version = "0.2.13", path = "remote/common" }
trz-gateway-server = { version = "0.2.13", path = "remote/server" }

axum = { version = "0.8.9" }
axum-extra = { version = "0.12.6" }
axum-server = { version = "0.8.0" }
base64 = { version = "0.22.1" }
