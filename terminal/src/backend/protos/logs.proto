syntax = "proto3";

package terrazzo.logs;

import "shared.proto";

service LogsService {
  rpc StreamLogs(LogsRequest) returns (stream LogsResponse);
}

message LogsRequest {
  terrazzo.shared.ClientAddress address = 1;
}

message LogsResponse {
  uint64 id = 1;
  LogLevel level = 2;
  string message = 3;
  uint64 timestamp_ms = 4;
  optional string file = 5;
}

enum LogLevel {
  INFO = 0;
  WARN = 1;
  ERROR = 2;
  DEBUG = 3;
}
